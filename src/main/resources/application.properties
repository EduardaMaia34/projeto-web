spring.application.name=projeto
server.port=8081

# Hibernate DDL: 'update' é adequado para desenvolvimento, mas pode causar problemas em produção.
# Considere 'validate' ou 'none' para produção após a primeira migração.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true